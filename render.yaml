services:
  # ── Rails API backend ──────────────────────────────────────────────
  - type: web
    name: toes-backend
    runtime: ruby
    rootDir: toes-backend
    buildCommand: |
      bundle install
      bundle exec rails assets:precompile 2>/dev/null || true
      bundle exec rails db:migrate
    startCommand: bundle exec rails server -p $PORT -e $RAILS_ENV
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: toes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: toes-redis
          type: redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false   # set manually in Render dashboard to your Vercel URL
      - key: CLOUDINARY_URL
        sync: false   # set manually in Render dashboard
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAILS_MAX_THREADS
        value: "5"
      - key: WEB_CONCURRENCY
        value: "2"

  # ── Redis (for ActionCable) ────────────────────────────────────────
  - type: redis
    name: toes-redis
    ipAllowList: []   # only allow internal access from the web service
    plan: free

databases:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  - name: toes-db
    plan: free
    databaseName: toes_backend_production
    user: toes
